syntax = "proto3";

package allbot;

option go_package = "github.com/allbot/allbot/proto";

// 插件服务接口
service PluginService {
  // 处理消息
  rpc Handle(MessageRequest) returns (MessageResponse);

  // 等待用户下一条消息（连续对话）
  rpc Listen(ListenRequest) returns (ListenResponse);

  // 回复消息
  rpc Reply(ReplyRequest) returns (ReplyResponse);

  // 发送图片
  rpc SendImage(SendImageRequest) returns (SendImageResponse);

  // 发送文件
  rpc SendFile(SendFileRequest) returns (SendFileResponse);

  // 获取用户信息
  rpc GetUserInfo(GetUserInfoRequest) returns (GetUserInfoResponse);

  // 获取群组信息
  rpc GetGroupInfo(GetGroupInfoRequest) returns (GetGroupInfoResponse);

  // @某人（QQ/微信）
  rpc AtUser(AtUserRequest) returns (AtUserResponse);

  // 数据存储
  rpc StorageGet(StorageGetRequest) returns (StorageGetResponse);
  rpc StorageSet(StorageSetRequest) returns (StorageSetResponse);

  // HTTP 请求
  rpc HttpGet(HttpGetRequest) returns (HttpGetResponse);
  rpc HttpPost(HttpPostRequest) returns (HttpPostResponse);
}

// 消息请求
message MessageRequest {
  string plugin_id = 1;
  string platform = 2;      // qq/wechat/telegram
  string user_id = 3;
  string group_id = 4;      // 私聊为空
  string content = 5;       // 消息内容
  string message_id = 6;
  map<string, string> metadata = 7;
}

// 消息响应
message MessageResponse {
  bool success = 1;
  string error = 2;
}

// 等待消息请求
message ListenRequest {
  string plugin_id = 1;
  string user_id = 2;
  string group_id = 3;
  int32 timeout = 4;        // 超时时间（秒）
}

// 等待消息响应
message ListenResponse {
  string content = 1;       // 用户发送的内容，超时返回空字符串
}

// 回复消息请求
message ReplyRequest {
  string platform = 1;
  string user_id = 2;
  string group_id = 3;
  string text = 4;
}

// 回复消息响应
message ReplyResponse {
  bool success = 1;
  string error = 2;
  string message_id = 3;
}

// 发送图片请求
message SendImageRequest {
  string platform = 1;
  string user_id = 2;
  string group_id = 3;
  string image_url = 4;
}

// 发送图片响应
message SendImageResponse {
  bool success = 1;
  string error = 2;
}

// 发送文件请求
message SendFileRequest {
  string platform = 1;
  string user_id = 2;
  string group_id = 3;
  string file_path = 4;
}

// 发送文件响应
message SendFileResponse {
  bool success = 1;
  string error = 2;
}

// 获取用户信息请求
message GetUserInfoRequest {
  string platform = 1;
  string user_id = 2;
}

// 获取用户信息响应
message GetUserInfoResponse {
  string user_id = 1;
  string nickname = 2;
  string avatar = 3;
  map<string, string> extra = 4;
}

// 获取群组信息请求
message GetGroupInfoRequest {
  string platform = 1;
  string group_id = 2;
}

// 获取群组信息响应
message GetGroupInfoResponse {
  string group_id = 1;
  string name = 2;
  int32 member_count = 3;
  map<string, string> extra = 4;
}

// @用户请求
message AtUserRequest {
  string platform = 1;
  string user_id = 2;
  string group_id = 3;
  string target_user_id = 4;
}

// @用户响应
message AtUserResponse {
  bool success = 1;
  string error = 2;
}

// 存储获取请求
message StorageGetRequest {
  string plugin_id = 1;
  string key = 2;
}

// 存储获取响应
message StorageGetResponse {
  string value = 1;
  bool exists = 2;
}

// 存储设置请求
message StorageSetRequest {
  string plugin_id = 1;
  string key = 2;
  string value = 3;
}

// 存储设置响应
message StorageSetResponse {
  bool success = 1;
  string error = 2;
}

// HTTP GET 请求
message HttpGetRequest {
  string url = 1;
  map<string, string> headers = 2;
}

// HTTP GET 响应
message HttpGetResponse {
  int32 status_code = 1;
  string body = 2;
  string error = 3;
}

// HTTP POST 请求
message HttpPostRequest {
  string url = 1;
  map<string, string> headers = 2;
  string body = 3;
}

// HTTP POST 响应
message HttpPostResponse {
  int32 status_code = 1;
  string body = 2;
  string error = 3;
}
