version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: allbot
      POSTGRES_PASSWORD: allbot123
      POSTGRES_DB: market
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  market:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://allbot:allbot123@db:5432/market
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    command: >
      sh -c "
        sleep 5 &&
        python -c 'from app.core.database import init_db; init_db()' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
