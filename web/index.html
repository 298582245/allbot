<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllBot 管理界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 1200px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 14px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card p {
            font-size: 32px;
            font-weight: bold;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .plugin-list {
            display: grid;
            gap: 15px;
        }

        .plugin-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .plugin-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .plugin-info p {
            color: #666;
            font-size: 14px;
        }

        .plugin-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .plugin-status.running {
            background: #d4edda;
            color: #155724;
        }

        .plugin-status.stopped {
            background: #f8d7da;
            color: #721c24;
        }

        .api-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }

        .api-info h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .api-endpoint {
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .api-endpoint code {
            background: white;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }

        .note p {
            color: #856404;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AllBot 管理界面</h1>
            <p>去中心化多平台机器人框架</p>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="admin123" value="admin123">
            </div>
            <button class="btn" onclick="login()">登录</button>
        </div>

        <!-- 仪表盘 -->
        <div id="dashboard" class="dashboard">
            <div class="stats">
                <div class="stat-card">
                    <h3>运行时间</h3>
                    <p id="uptime">--</p>
                </div>
                <div class="stat-card">
                    <h3>插件总数</h3>
                    <p id="pluginCount">--</p>
                </div>
                <div class="stat-card">
                    <h3>运行中</h3>
                    <p id="runningCount">--</p>
                </div>
                <div class="stat-card">
                    <h3>消息数</h3>
                    <p id="messageCount">--</p>
                </div>
            </div>

            <div class="section">
                <h2>插件列表</h2>
                <div id="pluginList" class="plugin-list">
                    <p style="color: #666;">加载中...</p>
                </div>
            </div>

            <div class="section">
                <h2>API 端点</h2>
                <div class="api-info">
                    <h3>可用接口</h3>
                    <div class="api-endpoint">
                        <code>POST /api/login</code> - 登录
                    </div>
                    <div class="api-endpoint">
                        <code>GET /api/plugins</code> - 插件列表
                    </div>
                    <div class="api-endpoint">
                        <code>GET /api/system/status</code> - 系统状态
                    </div>
                </div>
            </div>

            <div class="note">
                <p><strong>注意：</strong>这是 Web UI 的基础版本。完整的 Vue 3 + Element Plus 界面正在开发中。</p>
            </div>
        </div>
    </div>

    <script>
        let token = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password }),
                });

                const data = await response.json();

                if (response.ok) {
                    token = data.token;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                    loadDashboard();
                } else {
                    alert('登录失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('登录失败：' + error.message);
            }
        }

        async function loadDashboard() {
            await loadSystemStatus();
            await loadPlugins();
        }

        async function loadSystemStatus() {
            try {
                const response = await fetch('/api/system/status', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                    },
                });

                const data = await response.json();

                document.getElementById('uptime').textContent = data.uptime || '--';
                document.getElementById('pluginCount').textContent = data.pluginCount || 0;
                document.getElementById('runningCount').textContent = data.runningCount || 0;
                document.getElementById('messageCount').textContent = data.messageCount || 0;
            } catch (error) {
                console.error('Failed to load system status:', error);
            }
        }

        async function loadPlugins() {
            try {
                const response = await fetch('/api/plugins', {
                    headers: {
                        'Authorization': 'Bearer ' + token,
                    },
                });

                const plugins = await response.json();

                const pluginList = document.getElementById('pluginList');
                if (plugins.length === 0) {
                    pluginList.innerHTML = '<p style="color: #666;">暂无插件</p>';
                    return;
                }

                pluginList.innerHTML = plugins.map(plugin => `
                    <div class="plugin-item">
                        <div class="plugin-info">
                            <h3>${plugin.name}</h3>
                            <p>版本: ${plugin.version} | 运行时: ${plugin.runtime} | 端口: ${plugin.port}</p>
                        </div>
                        <span class="plugin-status ${plugin.status}">${plugin.status}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load plugins:', error);
                document.getElementById('pluginList').innerHTML = '<p style="color: #f00;">加载失败</p>';
            }
        }

        // 自动刷新
        setInterval(() => {
            if (token) {
                loadSystemStatus();
                loadPlugins();
            }
        }, 5000);
    </script>
</body>
</html>
