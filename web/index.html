<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllBot 管理界面</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 90%;
            max-width: 1200px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #333; font-size: 32px; margin-bottom: 10px; }
        .header p { color: #666; font-size: 14px; }
        .login-form { max-width: 400px; margin: 0 auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn-small { padding: 8px 16px; font-size: 14px; }
        .btn-success { background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%); }
        .btn-danger { background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%); }
        .dashboard { display: none; }
        .dashboard.active { display: block; }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            color: #666;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }
        .tab:hover { color: #667eea; }
        .tab.active { color: #667eea; border-bottom-color: #667eea; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-card h3 { font-size: 14px; margin-bottom: 10px; opacity: 0.9; }
        .stat-card p { font-size: 32px; font-weight: bold; }
        .section { margin-bottom: 30px; }
        .section h2 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .item-list { display: grid; gap: 15px; }
        .item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info h3 { color: #333; margin-bottom: 5px; }
        .item-info p { color: #666; font-size: 14px; }
        .item-actions { display: flex; gap: 10px; align-items: center; }
        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.running, .status-badge.enabled {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.stopped, .status-badge.disabled {
            background: #f8d7da;
            color: #721c24;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header { margin-bottom: 20px; }
        .modal-header h2 { color: #333; font-size: 24px; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
        .note {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 20px;
            border-radius: 4px;
        }
        .note p { color: #856404; margin: 0; }
        .message {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .message.success {
            background: #d4edda;
            border-left: 4px solid #28a745;
            color: #155724;
        }
        .message.error {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 AllBot 管理界面</h1>
            <p>去中心化多平台机器人框架</p>
        </div>

        <div id="loginForm" class="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" placeholder="admin" value="admin">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" placeholder="admin123" value="admin123">
            </div>
            <button class="btn" onclick="login()" style="width: 100%;">登录</button>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('overview')">概览</button>
                <button class="tab" onclick="switchTab('plugins')">插件管理</button>
                <button class="tab" onclick="switchTab('adapters')">平台配置</button>
            </div>

            <div id="tab-overview" class="tab-content active">
                <div class="stats">
                    <div class="stat-card"><h3>运行时间</h3><p id="uptime">--</p></div>
                    <div class="stat-card"><h3>插件总数</h3><p id="pluginCount">--</p></div>
                    <div class="stat-card"><h3>运行中</h3><p id="runningCount">--</p></div>
                    <div class="stat-card"><h3>消息数</h3><p id="messageCount">--</p></div>
                </div>
                <div class="note">
                    <p><strong>提示：</strong>平台配置已支持动态修改，无需重启机器人即可生效！</p>
                </div>
            </div>

            <div id="tab-plugins" class="tab-content">
                <div class="section">
                    <h2>插件列表</h2>
                    <div id="pluginList" class="item-list">
                        <p style="color: #666;">加载中...</p>
                    </div>
                </div>
            </div>

            <div id="tab-adapters" class="tab-content">
                <div class="section">
                    <h2>平台适配器</h2>
                    <div id="messageBox"></div>
                    <button class="btn btn-small btn-success" onclick="showAddAdapterModal()" style="margin-bottom: 20px;">添加平台</button>
                    <div id="adapterList" class="item-list">
                        <p style="color: #666;">加载中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="adapterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加平台</h2>
            </div>
            <div class="form-group">
                <label for="adapterPlatform">平台</label>
                <select id="adapterPlatform" onchange="updateAdapterForm()">
                    <option value="qq">QQ</option>
                    <option value="wechat">微信</option>
                    <option value="telegram">Telegram</option>
                </select>
            </div>
            <div class="form-group">
                <label for="adapterEnabled">状态</label>
                <select id="adapterEnabled">
                    <option value="true">启用</option>
                    <option value="false">禁用</option>
                </select>
            </div>
            <div id="adapterConfigForm"></div>
            <div class="modal-footer">
                <button class="btn btn-small" onclick="saveAdapter()">保存</button>
                <button class="btn btn-small btn-danger" onclick="closeAdapterModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let token = null;
        let currentEditingAdapter = null;

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await response.json();
                if (response.ok) {
                    token = data.token;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('dashboard').classList.add('active');
                    loadDashboard();
                } else {
                    alert('登录失败：' + (data.error || '未知错误'));
                }
            } catch (error) {
                alert('登录失败：' + error.message);
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active');
            if (tabName === 'plugins') loadPlugins();
            else if (tabName === 'adapters') loadAdapters();
        }

        async function loadDashboard() {
            await loadSystemStatus();
            await loadPlugins();
        }

        async function loadSystemStatus() {
            try {
                const response = await fetch('/api/system/status', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                document.getElementById('uptime').textContent = data.uptime || '--';
                document.getElementById('pluginCount').textContent = data.pluginCount || 0;
                document.getElementById('runningCount').textContent = data.runningCount || 0;
                document.getElementById('messageCount').textContent = data.messageCount || 0;
            } catch (error) {
                console.error('Failed to load system status:', error);
            }
        }

        async function loadPlugins() {
            try {
                const response = await fetch('/api/plugins', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const plugins = await response.json();
                const pluginList = document.getElementById('pluginList');
                if (plugins.length === 0) {
                    pluginList.innerHTML = '<p style="color: #666;">暂无插件</p>';
                    return;
                }
                pluginList.innerHTML = plugins.map(plugin => `
                    <div class="item">
                        <div class="item-info">
                            <h3>${plugin.name}</h3>
                            <p>版本: ${plugin.version} | 运行时: ${plugin.runtime} | 端口: ${plugin.port}</p>
                        </div>
                        <span class="status-badge ${plugin.status}">${plugin.status}</span>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Failed to load plugins:', error);
                document.getElementById('pluginList').innerHTML = '<p style="color: #f00;">加载失败</p>';
            }
        }

        async function loadAdapters() {
            try {
                const response = await fetch('/api/adapters', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const adapters = await response.json();
                const adapterList = document.getElementById('adapterList');
                if (adapters.length === 0) {
                    adapterList.innerHTML = '<p style="color: #666;">暂无平台配置，点击"添加平台"开始配置</p>';
                    return;
                }
                adapterList.innerHTML = adapters.map(adapter => {
                    const config = JSON.parse(adapter.config);
                    let configText = '';
                    if (adapter.platform === 'qq') {
                        configText = `API: ${config.api_url} | 监听: ${config.listen_addr}`;
                    } else if (adapter.platform === 'wechat') {
                        configText = `AppID: ${config.app_id}`;
                    } else if (adapter.platform === 'telegram') {
                        configText = `Token: ${config.bot_token.substring(0, 20)}...`;
                    }
                    return `
                        <div class="item">
                            <div class="item-info">
                                <h3>${getPlatformName(adapter.platform)}</h3>
                                <p>${configText}</p>
                            </div>
                            <div class="item-actions">
                                <span class="status-badge ${adapter.enabled ? 'enabled' : 'disabled'}">
                                    ${adapter.enabled ? '已启用' : '已禁用'}
                                </span>
                                <span class="status-badge ${adapter.running ? 'running' : 'stopped'}">
                                    ${adapter.running ? '运行中' : '已停止'}
                                </span>
                                <button class="btn btn-small" onclick="editAdapter('${adapter.platform}')">编辑</button>
                                <button class="btn btn-small btn-danger" onclick="deleteAdapter('${adapter.platform}')">删除</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Failed to load adapters:', error);
                document.getElementById('adapterList').innerHTML = '<p style="color: #f00;">加载失败</p>';
            }
        }

        function getPlatformName(platform) {
            const names = { 'qq': 'QQ', 'wechat': '微信', 'telegram': 'Telegram' };
            return names[platform] || platform;
        }

        function showAddAdapterModal() {
            currentEditingAdapter = null;
            document.getElementById('modalTitle').textContent = '添加平台';
            document.getElementById('adapterPlatform').disabled = false;
            document.getElementById('adapterPlatform').value = 'qq';
            document.getElementById('adapterEnabled').value = 'false';
            updateAdapterForm();
            document.getElementById('adapterModal').classList.add('active');
        }

        async function editAdapter(platform) {
            try {
                const response = await fetch('/api/adapters/' + platform, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const adapter = await response.json();
                currentEditingAdapter = adapter;
                document.getElementById('modalTitle').textContent = '编辑平台';
                document.getElementById('adapterPlatform').value = adapter.platform;
                document.getElementById('adapterPlatform').disabled = true;
                document.getElementById('adapterEnabled').value = adapter.enabled.toString();
                updateAdapterForm(JSON.parse(adapter.config));
                document.getElementById('adapterModal').classList.add('active');
            } catch (error) {
                showMessage('加载配置失败: ' + error.message, 'error');
            }
        }

        function updateAdapterForm(existingConfig = null) {
            const platform = document.getElementById('adapterPlatform').value;
            const formContainer = document.getElementById('adapterConfigForm');
            let formHTML = '';
            if (platform === 'qq') {
                formHTML = `
                    <div class="form-group">
                        <label for="qqApiUrl">go-cqhttp API 地址</label>
                        <input type="text" id="qqApiUrl" placeholder="http://localhost:5700" value="${existingConfig?.api_url || 'http://localhost:5700'}">
                    </div>
                    <div class="form-group">
                        <label for="qqListenAddr">监听地址</label>
                        <input type="text" id="qqListenAddr" placeholder=":8080" value="${existingConfig?.listen_addr || ':8080'}">
                    </div>
                `;
            } else if (platform === 'wechat') {
                formHTML = `
                    <div class="form-group">
                        <label for="wechatAppId">App ID</label>
                        <input type="text" id="wechatAppId" placeholder="wx..." value="${existingConfig?.app_id || ''}">
                    </div>
                    <div class="form-group">
                        <label for="wechatAppSecret">App Secret</label>
                        <input type="text" id="wechatAppSecret" placeholder="..." value="${existingConfig?.app_secret || ''}">
                    </div>
                `;
            } else if (platform === 'telegram') {
                formHTML = `
                    <div class="form-group">
                        <label for="telegramBotToken">Bot Token</label>
                        <input type="text" id="telegramBotToken" placeholder="123456:ABC-DEF..." value="${existingConfig?.bot_token || ''}">
                    </div>
                `;
            }
            formContainer.innerHTML = formHTML;
        }

        async function saveAdapter() {
            const platform = document.getElementById('adapterPlatform').value;
            const enabled = document.getElementById('adapterEnabled').value === 'true';
            let config = {};
            if (platform === 'qq') {
                config = {
                    api_url: document.getElementById('qqApiUrl').value,
                    listen_addr: document.getElementById('qqListenAddr').value
                };
            } else if (platform === 'wechat') {
                config = {
                    app_id: document.getElementById('wechatAppId').value,
                    app_secret: document.getElementById('wechatAppSecret').value
                };
            } else if (platform === 'telegram') {
                config = {
                    bot_token: document.getElementById('telegramBotToken').value
                };
            }
            try {
                const response = await fetch('/api/adapters', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ platform, enabled, config })
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('配置已保存并生效！', 'success');
                    closeAdapterModal();
                    loadAdapters();
                } else {
                    showMessage('保存失败: ' + (data.error || '未知错误'), 'error');
                }
            } catch (error) {
                showMessage('保存失败: ' + error.message, 'error');
            }
        }

        async function deleteAdapter(platform) {
            if (!confirm('确定要删除 ' + getPlatformName(platform) + ' 的配置吗？')) return;
            try {
                const response = await fetch('/api/adapters/' + platform, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await response.json();
                if (response.ok) {
                    showMessage('配置已删除', 'success');
                    loadAdapters();
                } else {
                    showMessage('删除失败: ' + (data.error || '未知错误'), 'error');
                }
            } catch (error) {
                showMessage('删除失败: ' + error.message, 'error');
            }
        }

        function closeAdapterModal() {
            document.getElementById('adapterModal').classList.remove('active');
        }

        function showMessage(message, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => { messageBox.innerHTML = ''; }, 5000);
        }

        setInterval(() => {
            if (token) {
                loadSystemStatus();
                const activeTab = document.querySelector('.tab.active');
                if (activeTab) {
                    const tabText = activeTab.textContent;
                    if (tabText === '插件管理') loadPlugins();
                    else if (tabText === '平台配置') loadAdapters();
                }
            }
        }, 5000);
    </script>
</body>
</html>
